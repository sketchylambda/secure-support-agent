<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Customer Support</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        #dashboard { display: none; }
        #chat-container { max-width: 800px; margin: 0 auto; border: 1px solid var(--neon-cyan); }
    </style>
</head>
<body>
    <main id="chat-container">
        <h2 style="text-align: center; color: var(--neon-cyan);">Secure AI Support</h2>
        <div id="chat-history">
            <div class="message ai">Welcome. How can I assist you today?</div>
        </div>
        <div id="input-area">
            <input type="text" id="user-input" placeholder="Type your message..." autocomplete="off">
            <button onclick="sendMessage()">SEND</button>
        </div>
    </main>

    <script>
        const sessionId = "sess_" + Math.random().toString(36).substr(2, 9);

        async function sendMessage() {
            const inputField = document.getElementById("user-input");
            const message = inputField.value.trim();
            if (!message) return;

            appendMessage(message, "user");
            inputField.value = "";

            try {
                const response = await fetch("/api/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ session_id: sessionId, message: message })
                });
                const data = await response.json();
                appendMessage(data.reply, "ai");
            } catch (error) {
                appendMessage("Connection error.", "ai");
            }
        }

        function appendMessage(text, sender) {
            const chatHistory = document.getElementById("chat-history");
            const msgDiv = document.createElement("div");
            msgDiv.className = `message ${sender}`;
            
            msgDiv.innerHTML = text; 
            
            chatHistory.appendChild(msgDiv);
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }

        document.getElementById("user-input").addEventListener("keypress", function(e) {
            if (e.key === "Enter") sendMessage();
        });
    </script>
</body>
</html>
